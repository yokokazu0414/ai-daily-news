name: Notion DB Fix (one-off)
on:
  workflow_dispatch:
permissions:
  contents: read
jobs:
  fix:
    runs-on: ubuntu-latest
    env:
      NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
      NOTION_DB: ${{ secrets.NOTION_DB }}
      CUTOFF: '2026-06-27'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: |
          python3 - <<'PY'
          import os, csv, json, re, time, urllib.request, urllib.error
          TOKEN=os.environ["NOTION_TOKEN"]; DB=os.environ["NOTION_DB"]; CUTOFF=os.environ["CUTOFF"]
          H={"Authorization":f"Bearer {TOKEN}","Notion-Version":"2022-06-28","Content-Type":"application/json"}
          def api(method,url,data=None):
              r=urllib.request.Request(url, data=json.dumps(data).encode() if data is not None else None, method=method, headers=H)
              with urllib.request.urlopen(r) as resp:
                  return json.load(resp)
          # 1) archive existing rows with 日付 >= CUTOFF
          ids=[]; cur=None
          while True:
              body={"page_size":100,"filter":{"property":"日付","date":{"on_or_after":CUTOFF}}}
              if cur: body["start_cursor"]=cur
              q=api("POST", f"https://api.notion.com/v1/databases/{DB}/query", body)
              ids+=[p["id"] for p in q["results"]]
              if not q.get("has_more"): break
              cur=q["next_cursor"]
          print(f"[archive] {len(ids)} rows with 日付>={CUTOFF}")
          for pid in ids:
              api("PATCH", f"https://api.notion.com/v1/pages/{pid}", {"archived":True}); time.sleep(0.35)
          print("[archive] done")
          # 2) reinsert from index.csv (9-col rows with 日付>=CUTOFF), correct mapping
          ins=0
          with open("index.csv", encoding="utf-8") as f:
              reader=csv.reader(f); next(reader)
              for row in reader:
                  if len(row)<9: continue
                  d=row[0].split(" ")[0]
                  if d < CUTOFF: continue
                  kokai=(row[1].split(" ")[0] if row[1].strip() else d) or d
                  players=[{"name":p.strip()} for p in re.split(r'[/・]', row[2]) if p.strip()]
                  link=row[8].strip()
                  payload={"parent":{"database_id":DB},"properties":{
                      "タイトル":{"title":[{"text":{"content":row[4][:2000]}}]},
                      "日付":{"date":{"start":d}},
                      "公開日":{"date":{"start":kokai}},
                      "プレーヤー":{"multi_select":players},
                      "分類":{"select":{"name":row[3].strip()}},
                      "出典":{"rich_text":[{"text":{"content":row[5][:2000]}}]},
                      "要約":{"rich_text":[{"text":{"content":row[6][:2000]}}]},
                      "本文":{"rich_text":[{"text":{"content":row[7][:2000]}}]},
                      "リンク":{"url": link if link.startswith("http") else None},
                  }}
                  try:
                      api("POST","https://api.notion.com/v1/pages",payload); ins+=1
                      print(f"[insert] {d} | {row[4][:30]}")
                  except urllib.error.HTTPError as e:
                      print(f"[insert-ERR] {d} {e.code} {e.read().decode()[:200]}")
                  time.sleep(0.35)
          print(f"[reinsert] {ins} rows")
          PY
